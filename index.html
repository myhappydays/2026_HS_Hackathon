<!DOCTYPE html>
<html lang="ko" data-theme="theme-crimson" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>위험지도 - 내 주변 위험 제보</title>

  <!-- Pretendard Font -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['var(--font-sans)', 'sans-serif'] },
          colors: {
            background:   'var(--background)',
            'background-1': 'var(--background-1)',
            'background-2': 'var(--background-2)',
            foreground:   'var(--foreground)',
            primary: {
              DEFAULT: 'var(--primary)',
              50:  'var(--primary-50)',  100: 'var(--primary-100)',
              200: 'var(--primary-200)', 300: 'var(--primary-300)',
              400: 'var(--primary-400)', 500: 'var(--primary-500)',
              600: 'var(--primary-600)', 700: 'var(--primary-700)',
              800: 'var(--primary-800)', 900: 'var(--primary-900)',
              950: 'var(--primary-950)',
            },
            muted: {
              DEFAULT: 'var(--muted)',
              foreground:   'var(--muted-foreground)',
              'foreground-1': 'var(--muted-foreground-1)',
              'foreground-2': 'var(--muted-foreground-2)',
            },
            border:  'var(--border)',
            card:    { DEFAULT: 'var(--card)', header: 'var(--card-header)', footer: 'var(--card-footer)' },
            surface: { DEFAULT: 'var(--surface)', 1: 'var(--surface-1)', 2: 'var(--surface-2)', 3: 'var(--surface-3)' },
          }
        }
      },
      plugins: [
        function({ addVariant }) {
          addVariant('hs-dropdown-open', '.hs-dropdown.open &');
          addVariant('hs-accordion-active', '.hs-accordion.active &');
        }
      ]
    }
  </script>

  <!-- Rose Theme CSS -->
  <link rel="stylesheet" href="/css/themes/crimson.css">

  <style>
    body { font-family: var(--font-sans); }
    /* 네이버 지도 컨테이너 */
    #map { width: 100%; height: 240px; }
  </style>
</head>
<body class="bg-background text-foreground min-h-screen">

  <!-- 모바일 앱 래퍼 -->
  <div class="relative w-full max-w-[430px] mx-auto min-h-screen border-x border-border shadow-2xl bg-background flex flex-col">

    <!-- 지도 뷰 -->
    <div class="relative">
      <div id="map" class="w-full bg-surface"></div>
      <!-- 지도 로딩 전 플레이스홀더 -->
      <div id="map-placeholder" class="absolute inset-0 flex items-center justify-center bg-surface">
        <span class="text-muted-foreground text-sm">지도 불러오는 중...</span>
      </div>
    </div>

    <!-- 리스트 헤더 -->
    <div class="px-4 pt-4 pb-2 flex items-center justify-between">
      <h2 class="font-semibold text-sm text-foreground">내 주변 위험 제보</h2>
      <span id="report-count" class="text-xs text-muted-foreground">총 0건</span>
    </div>

    <!-- 위험 제보 리스트 -->
    <main class="flex-1 overflow-y-auto px-4 pb-24 space-y-3" id="report-list">
      <!-- JS로 동적 렌더링 -->

      <!-- 빈 상태 UI (데이터 없을 때) -->
      <div id="empty-state" class="flex flex-col items-center justify-center py-16 gap-3">
        <div class="w-14 h-14 rounded-full bg-surface flex items-center justify-center">
          <svg class="w-7 h-7 text-muted-foreground" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
          </svg>
        </div>
        <p class="text-sm text-muted-foreground text-center">
          아직 등록된 위험 제보가 없어요.<br>
          <span class="text-primary font-medium">첫 번째로 제보</span>해 보세요!
        </p>
      </div>
    </main>

    <!-- 하단 알약 FAB — 제보하기 버튼 -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-40">
      <a href="/report.html"
        class="inline-flex items-center gap-2 px-6 py-3.5 rounded-full bg-primary text-white font-semibold text-sm shadow-lg shadow-primary/30 active:scale-95 transition-transform">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
        위험 제보하기
      </a>
    </div>

  </div><!-- /모바일 앱 래퍼 -->

  <!-- 카카오 지도 API (services: 역지오코딩, clusterer: 마커 클러스터링) -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=82c99f718e19c13b6028995f893ca1b9&libraries=services,clusterer"></script>

  <!-- Preline UI JS -->
  <script src="https://cdn.jsdelivr.net/npm/preline@2.7.0/dist/preline.min.js"></script>

  <!-- 메인 페이지 JS -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
