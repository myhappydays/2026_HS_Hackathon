                "extraMarkup": "<div class=\"absolute top-1/2 right-2.5 -translate-y-1/2 pointer-events-none\"><svg class=\"shrink-0 size-3.5 text-muted-foreground\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
              }'
              class="hidden">
              <option value="us.anthropic.claude-haiku-4-5-20251001-v1:0">Claude Haiku 4.5</option>
              <option value="us.anthropic.claude-sonnet-4-6">Claude Sonnet 4.6</option>
              <option value="us.anthropic.claude-opus-4-6-v1">Claude Opus 4.6</option>
            </select>
            <p class="text-[11px] text-muted-foreground">토큰 발급: AWS 콘솔 → Bedrock → API 접근</p>
          </div>

          <hr class="border-border">

          <!-- 취합 기준 -->
          <div class="flex flex-col gap-4">
            <h4 class="text-xs font-semibold text-foreground">취합 기준</h4>

            <!-- 정렬 방식 -->
            <div class="flex flex-col gap-1.5">
              <label for="ai-sort-select" class="text-xs text-muted-foreground">정렬 방식</label>
              <select id="ai-sort-select"
                data-hs-select='{
                  "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                  "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 ps-3 pe-9 flex text-nowrap w-full cursor-pointer bg-surface border border-border text-foreground rounded-lg text-start text-sm hover:bg-surface-1 focus:outline-none focus:border-primary transition-colors",
                  "dropdownClasses": "mt-1.5 z-[99999] w-full p-1 space-y-0.5 bg-card border border-border rounded-xl shadow-xl overflow-hidden",
                  "optionClasses": "hs-selected:bg-primary/10 hs-selected:text-primary py-2 px-3 w-full text-sm text-foreground cursor-pointer hover:bg-surface rounded-lg focus:outline-none",
                  "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-primary\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>",
                  "extraMarkup": "<div class=\"absolute top-1/2 right-2.5 -translate-y-1/2 pointer-events-none\"><svg class=\"shrink-0 size-3.5 text-muted-foreground\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
                }'
                class="hidden">
                <option value="dist">거리순 (가까운 군집 우선)</option>
                <option value="danger">위험도 + 거리 (위험도 높은 군집 우선)</option>
                <option value="recent">최신순 (최근 제보 있는 군집 우선)</option>
              </select>
            </div>

            <!-- 최대 거리 / 최대 군집 수 -->
            <div class="grid grid-cols-2 gap-3">
              <div class="flex flex-col gap-1.5">
                <label for="ai-max-dist" class="text-xs text-muted-foreground">최대 거리 (m)</label>
                <input type="number" id="ai-max-dist" min="100" max="50000" step="100" value="2000"
                  class="py-2 px-3.5 block w-full bg-surface border border-border rounded-xl text-sm text-foreground outline-none focus:border-primary transition-colors"/>
              </div>
              <div class="flex flex-col gap-1.5">
                <label for="ai-max-count" class="text-xs text-muted-foreground">최대 군집 수</label>
                <input type="number" id="ai-max-count" min="1" max="50" step="1" value="10"
                  class="py-2 px-3.5 block w-full bg-surface border border-border rounded-xl text-sm text-foreground outline-none focus:border-primary transition-colors"/>
              </div>
            </div>

            <!-- 최소 제보 수 -->
            <div class="flex flex-col gap-1.5">
              <label for="ai-min-reports" class="text-xs text-muted-foreground">최소 제보 수 (건 이상인 군집만)</label>
              <input type="number" id="ai-min-reports" min="1" max="100" step="1" value="1"
                class="py-2 px-3.5 block w-full bg-surface border border-border rounded-xl text-sm text-foreground outline-none focus:border-primary transition-colors"/>
            </div>
          </div>

        </div>

        <!-- 푸터 -->
        <div class="px-5 py-4 border-t border-border flex flex-col gap-2">
          <button id="ai-save-btn" type="button"
            class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-2 rounded-xl font-semibold bg-primary text-white text-sm hover:bg-primary/90 active:scale-95 transition-all">
            저장하고 요약 시작
          </button>
          <button id="ai-clear-btn" type="button"
            class="w-full py-2 text-xs text-muted-foreground hover:text-foreground transition-colors text-center">
            AI 요약 끄기 / 토큰 초기화
          </button>
        </div>

      </div>
    </div>
  </div><!-- /ai-modal -->

  <!-- 카카오 지도 API (services: 역지오코딩, clusterer: 마커 클러스터링) -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=82c99f718e19c13b6028995f893ca1b9&libraries=services,clusterer"></script>

  <!-- Preline UI JS -->
  <script src="https://cdn.jsdelivr.net/npm/preline@2.7.0/dist/preline.min.js"></script>

  <!-- 메인 페이지 JS -->
</body>
</html>
